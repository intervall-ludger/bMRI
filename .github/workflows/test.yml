name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check src/bmri test

      - name: Run tests (Python backend only)
        run: uv run pytest --no-cov -q

  rust-backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python deps (creates .venv)
        run: uv sync --extra dev

      - name: Build Rust wheel and install into the project venv
        run: |
          cd rust
          uvx maturin build --release
          # Install into the uv project venv (not the system interpreter)
          uv pip install target/wheels/bmri_fit-*.whl

      - name: Run tests including Rust backend
        run: |
          uv run pytest \
            test/test_fitting_accuracy.py \
            test/test_backend_equivalence.py \
            test/test_dwi_models.py \
            test/test_spectrum.py \
            --no-cov -q
