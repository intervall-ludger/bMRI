<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bMRI Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top bar -->
<header>
    <div class="header-left">
        <span class="logo">bMRI</span>
        <div id="param-tabs" class="param-tabs"></div>
    </div>
    <div class="header-right">
        <span id="header-info" class="meta"></span>
    </div>
</header>

<!-- Main content -->
<div class="container">
    <div class="main-image" id="main-container">
        <div id="img-wrapper" style="position:relative; display:inline-block;">
            <img id="main-img" alt="Slice" src="">
            <canvas id="marker-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        </div>
    </div>

    <div class="right-panel">
        <div class="section">
            <div class="section-title">Pixel Fit</div>
            <div id="fit-overlay-info" class="fit-hint">Click a pixel to inspect</div>
            <canvas id="fit-chart"></canvas>
        </div>
        <div class="section">
            <div class="section-title">ROI Statistics</div>
            <table class="stats-table">
                <thead>
                    <tr><th>ROI</th><th>Mean</th><th>Std</th><th>Px</th><th>R²</th></tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Metadata</div>
            <table class="meta-table">
                <tbody id="meta-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
    <div class="control-group">
        <label>Slice</label>
        <span id="slice-label" class="control-value">-/-</span>
        <input type="range" id="slice-slider" min="0" max="0" value="0">
    </div>
    <div class="control-group">
        <label>Color</label>
        <input type="number" id="vmin" placeholder="min" step="any" class="small-input">
        <span class="sep">–</span>
        <input type="number" id="vmax" placeholder="max" step="any" class="small-input">
    </div>
    <div class="control-group">
        <label>Zoom</label>
        <span id="zoom-label" class="control-value">1.0x</span>
        <input type="range" id="zoom-slider" min="50" max="500" value="100" step="10">
    </div>
    <div class="control-group">
        <label class="toggle-label"><input type="checkbox" id="mask-toggle" checked> Mask</label>
    </div>
    <div class="shortcuts">
        <kbd>←→</kbd> slice <kbd>+−</kbd> zoom <kbd>0</kbd> reset <kbd>Tab</kbd> param <kbd>Esc</kbd> close
    </div>
</div>

<script src="/static/viewer.js?v=5"></script>
</body>
</html>
