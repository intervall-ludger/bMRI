<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bMRI Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="header-left">
        <span class="logo">bMRI</span>
        <div class="patient-nav" id="patient-nav" style="display:none">
            <button id="prev-patient" class="nav-btn">‹</button>
            <select id="patient-select" class="small-select"></select>
            <button id="next-patient" class="nav-btn">›</button>
        </div>
        <div id="param-tabs" class="param-tabs"></div>
    </div>
    <div class="header-right">
        <span id="header-info" class="meta"></span>
    </div>
</header>

<div class="container">
    <div class="main-image" id="main-container">
        <div id="img-wrapper" style="position:relative; display:inline-block;">
            <img id="main-img" alt="Slice" src="">
            <canvas id="marker-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        </div>
    </div>

    <div class="right-panel">
        <div class="section">
            <div class="section-title">Pixel Fit</div>
            <div id="fit-overlay-info" class="fit-hint">Click a pixel to inspect</div>
            <canvas id="fit-chart"></canvas>
        </div>
        <div class="section">
            <div class="section-title">ROI Statistics</div>
            <table class="stats-table">
                <thead>
                    <tr><th>ROI</th><th>Mean</th><th>Std</th><th>Px</th><th>R²</th></tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Metadata</div>
            <table class="meta-table">
                <tbody id="meta-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <div class="control-group">
        <label>Slice</label>
        <span id="slice-label" class="control-value">-/-</span>
        <input type="range" id="slice-slider" min="0" max="0" value="0">
    </div>
    <div class="control-group">
        <label>Color</label>
        <input type="number" id="vmin" placeholder="min" step="any" class="small-input">
        <span class="sep">–</span>
        <input type="number" id="vmax" placeholder="max" step="any" class="small-input">
    </div>
    <div class="control-group">
        <label>Cmap</label>
        <select id="cmap-select" class="small-select">
            <option value="hot">hot</option>
            <option value="viridis">viridis</option>
            <option value="plasma">plasma</option>
            <option value="inferno">inferno</option>
            <option value="magma">magma</option>
            <option value="RdBu_r">RdBu_r</option>
            <option value="coolwarm">coolwarm</option>
            <option value="jet">jet</option>
            <option value="turbo">turbo</option>
        </select>
    </div>
    <div class="control-group">
        <label>Alpha</label>
        <span id="alpha-label" class="control-value">1.0</span>
        <input type="range" id="alpha-slider" min="10" max="100" value="100" step="5">
    </div>
    <div class="control-group">
        <label>Zoom</label>
        <span id="zoom-label" class="control-value">1.0x</span>
        <input type="range" id="zoom-slider" min="50" max="500" value="100" step="10">
    </div>
    <div class="control-group">
        <label class="toggle-label"><input type="checkbox" id="mask-toggle" checked> Mask</label>
    </div>
    <div class="control-group" id="fit-btn-group" style="display:none">
        <button id="fit-btn" class="action-btn">Refit</button>
        <div class="fit-progress-wrap" id="fit-progress-wrap" style="display:none">
            <div class="fit-progress-bar"><div class="fit-progress-fill" id="fit-progress-fill"></div></div>
            <span id="fit-status" class="fit-status-text"></span>
        </div>
    </div>
    <div class="shortcuts">
        <kbd>←→</kbd> slice <kbd>+−</kbd> zoom <kbd>0</kbd> reset <kbd>Tab</kbd> param
    </div>
</div>

<script src="/static/viewer.js?v=7"></script>
</body>
</html>
